<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>寄せ書き｜みんなのメッセージ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;height:100%;overscroll-behavior:none;background:#e4e7ea}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
@keyframes sheetin{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes pinpop{0%{transform:translate(-50%,-50%) scale(.4);opacity:0}70%{transform:translate(-50%,-50%) scale(1.15);opacity:1}100%{transform:translate(-50%,-50%) scale(1)}}
#app{position:fixed;inset:0;overflow:hidden;font-family:'Zen Maru Gothic',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  const THEME = {
    envW: 110, envRatio: 0.72, envRadius: 3, envColor: '#f2dd8e', flapColor: '#e3c463',
    shadow: 0.18, tilt: 4, nameSize: 12, nameColor: '#6b5c26',
    pinSize: 18, pinColor: '#e23b2e', pinOffset: -8,
    bgColor: '#e4e7ea', patDensity: 0.05, centerSize: 210
  };

  function rng(seed) {
    let t = seed >>> 0;
    return () => {
      t += 0x6D2B79F5;
      let r = Math.imul(t ^ (t >>> 15), 1 | t);
      r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
      return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
    };
  }

  function buildData() {
    const names = ['ゆうた','さくら','けんじ','あおい','ミホ','たかし','リサ','ショウ','なな','ヒロ','まい','ダイキ','えみ','こうた'];
    const comments = [
      'ご卒業おめでとうございます！一緒に過ごした時間は宝物です。新しい場所でも、らしさ全開で頑張ってください。また集まりましょうね！',
      'お疲れさまでした！いつも笑顔で助けてくれてありがとう。これからの新しい挑戦、心から応援しています。体にだけは気をつけて！',
      'おめでとう！初めて会った日のことを今でも覚えています。あなたのおかげで毎日が楽しかったです。ずっと友達でいてください。',
      '本当にありがとうございました。困ったときいつも一番に声をかけてくれたこと、忘れません。またご飯行きましょう！'
    ];
    const S = THEME;
    const rnd = rng(7);
    const C = 800, minR = S.centerSize / 2 + S.envW * 0.72 + 26, maxR = 640;
    const data = [];
    for (let i = 0; i < names.length; i++) {
      const a = rnd() * Math.PI * 2;
      const r = minR + Math.pow(rnd(), 0.72) * Math.max(40, maxR - minR);
      data.push({
        name: names[i],
        comment: comments[i % comments.length],
        hasPhoto: i % 3 !== 0,
        x: Math.min(1450, Math.max(150, C + Math.cos(a) * r * 1.12)),
        y: Math.min(1430, Math.max(170, C + Math.sin(a) * r * 0.95)),
        deg: (rnd() * 2 - 1) * S.tilt
      });
    }
    return data;
  }

  function styleStr(obj) {
    return Object.keys(obj).map(k => {
      const prop = k.replace(/[A-Z]/g, m => '-' + m.toLowerCase());
      return `${prop}:${obj[k]}`;
    }).join(';');
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  class Viewer {
    constructor(root) {
      this.root = root;
      this.data = buildData();
      this.state = { panX: 0, panY: 0, zoom: 1, open: null, query: '', focused: false };
      this._ptrs = new Map();
      this._pinch = null;
      this._d = null;

      root.style.background = THEME.bgColor;
      root.addEventListener('pointerdown', e => this.onDown(e));
      root.addEventListener('pointermove', e => this.onMove(e));
      root.addEventListener('pointerup', e => this.onUp(e));
      root.addEventListener('pointerleave', e => this.onUp(e));
      root.addEventListener('wheel', e => this.onWheel(e), { passive: true });
      root.addEventListener('click', e => this.onClick(e));
      root.addEventListener('input', e => this.onInput(e));

      this.render();
    }

    setState(patch) { Object.assign(this.state, patch); this.render(); }

    canvasTransform() {
      const s = this.state;
      return `translate(calc(-50% + ${s.panX}px), calc(-50% + ${s.panY}px)) scale(${s.zoom})`;
    }

    updateTransform() {
      const canvas = this.root.querySelector('#canvas');
      if (canvas) canvas.style.transform = this.canvasTransform();
    }

    envelopeHtml(item, i) {
      const S = THEME;
      const envH = S.envW * S.envRatio;
      const wrapStyle = {
        position: 'absolute', left: item.x + 'px', top: item.y + 'px',
        width: S.envW + 'px', height: envH + 'px',
        transform: `translate(-50%,-50%) rotate(${item.deg}deg)`,
        zIndex: i + 1, cursor: 'pointer',
        transition: 'left .5s ease, top .5s ease'
      };
      const bodyStyle = {
        position: 'absolute', inset: 0, background: S.envColor,
        borderRadius: S.envRadius + 'px', overflow: 'hidden',
        boxShadow: `0 2px 8px rgba(0,0,0,${S.shadow})`
      };
      const flapStyle = {
        position: 'absolute', top: 0, left: 0, right: 0, height: '46%',
        background: S.flapColor, clipPath: 'polygon(0 0, 100% 0, 50% 100%)'
      };
      const nameStyle = {
        position: 'absolute', bottom: '7%', left: 0, right: 0,
        textAlign: 'center', fontSize: S.nameSize + 'px',
        fontWeight: 700, color: S.nameColor, whiteSpace: 'nowrap', overflow: 'hidden'
      };
      const pinStyle = {
        position: 'absolute', top: S.pinOffset + 'px', left: '50%',
        transform: 'translateX(-50%)',
        width: S.pinSize + 'px', height: S.pinSize + 'px', borderRadius: '50%',
        background: `radial-gradient(circle at 35% 30%, rgba(255,255,255,.9), rgba(255,255,255,0) 46%), ${S.pinColor}`,
        boxShadow: '0 2px 3px rgba(0,0,0,.35)'
      };
      return `
        <div style="${styleStr(wrapStyle)}" data-action="open-envelope" data-idx="${i}">
          <div style="${styleStr(bodyStyle)}">
            <div style="${styleStr(flapStyle)}"></div>
            <div style="${styleStr(nameStyle)}">${esc(item.name)}</div>
          </div>
          <div style="${styleStr(pinStyle)}"></div>
        </div>`;
    }

    template() {
      const S = THEME;
      const st = this.state;
      const q = st.query.trim();
      const results = q ? this.data.map((d, idx) => ({ d, idx })).filter(({ d }) => d.name.includes(q)) : [];
      const showResults = st.focused || q.length > 0;
      const noResults = q.length > 0 && results.length === 0;

      const canvasStyle = {
        position: 'absolute', left: '50%', top: '50%',
        width: '1600px', height: '1600px',
        transform: this.canvasTransform(),
        backgroundColor: S.bgColor,
        backgroundImage: `repeating-linear-gradient(90deg, rgba(255,255,255,${S.patDensity * 4}) 0px, rgba(255,255,255,${S.patDensity * 4}) 42px, rgba(255,255,255,0) 42px, rgba(255,255,255,0) 84px), linear-gradient(rgba(255,255,255,.3), rgba(0,0,0,.03))`
      };
      const centerStyle = {
        position: 'absolute', left: '800px', top: '800px',
        width: S.centerSize + 'px', height: S.centerSize + 'px',
        transform: 'translate(-50%,-50%)',
        background: 'rgba(255,255,255,.55)', border: '2px dashed rgba(0,0,0,.2)',
        borderRadius: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '12px'
      };

      return `
        <div id="canvas" style="${styleStr(canvasStyle)}">
          <div style="${styleStr(centerStyle)}">
            <div style="font-weight:700;opacity:.5;text-align:center;line-height:1.5;font-size:14px">中心地デザイン<br>（プレースホルダ）</div>
          </div>
          ${this.data.map((item, i) => this.envelopeHtml(item, i)).join('')}
        </div>

        <div style="position:absolute;top:calc(env(safe-area-inset-top) + 10px);left:12px;right:12px;z-index:15">
          <div style="background:#fff;border-radius:26px;box-shadow:0 2px 10px rgba(0,0,0,.18);display:flex;align-items:center;gap:10px;padding:12px 16px">
            <span style="font-size:16px;opacity:.55">🔍</span>
            <input data-nopan="1" data-field="query" data-action="query-input" value="${esc(st.query)}" data-action-focus="focus-query" placeholder="名前で検索" style="border:none;outline:none;flex:1;font-size:15px;font-family:inherit;background:transparent;color:#333">
            ${st.query ? `<button data-nopan="1" data-action="clear-query" style="border:none;background:#eef0f3;border-radius:50%;width:26px;height:26px;color:#777;font-size:13px">✕</button>` : ''}
          </div>
          ${showResults ? `
          <div data-nopan="1" style="margin-top:8px;background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.18);overflow:hidden;max-height:44dvh;overflow-y:auto">
            ${results.map(({ d, idx }) => `
              <div data-action="goto-result" data-idx="${idx}" style="padding:13px 16px;border-bottom:1px solid #f0f1f3;display:flex;align-items:center;gap:10px;cursor:pointer">
                <span style="font-size:15px;color:#e23b2e">📍</span>
                <span style="font-size:14.5px;font-weight:700;color:#3a3d42">${esc(d.name)}</span>
              </div>`).join('')}
            ${noResults ? `<div style="padding:16px;font-size:13.5px;color:#9aa1ab;text-align:center">見つかりませんでした</div>` : ''}
          </div>` : ''}
        </div>

        <button data-nopan="1" data-action="recenter" style="position:absolute;right:14px;bottom:calc(env(safe-area-inset-bottom) + 20px);z-index:15;width:46px;height:46px;border-radius:50%;border:none;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.22);font-size:20px;color:#3b6ea5;display:flex;align-items:center;justify-content:center">◎</button>

        ${st.open ? `
        <div data-nopan="1" style="position:absolute;left:0;right:0;bottom:0;z-index:30;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -6px 30px rgba(0,0,0,.25);padding:10px 20px calc(env(safe-area-inset-bottom) + 22px);animation:sheetin .22s ease-out;max-height:70dvh;overflow-y:auto">
          <div style="display:flex;justify-content:center;padding:2px 0 10px">
            <div style="width:44px;height:5px;border-radius:3px;background:#e0e3e8"></div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div style="font-size:18px;font-weight:800;color:#333">${esc(st.open.name)} さんより</div>
            <button data-action="close-sheet" style="width:34px;height:34px;border-radius:50%;border:none;background:#eef0f3;font-size:15px;color:#666">✕</button>
          </div>
          ${st.open.hasPhoto ? `<div style="width:100%;height:170px;border-radius:12px;background:#e9ecef;display:flex;align-items:center;justify-content:center;color:#9aa1ab;font-size:13px;font-weight:700;margin-bottom:12px">写真（プレースホルダ）</div>` : ''}
          <div style="font-size:15px;line-height:1.8;color:#3d4148">${esc(st.open.comment)}</div>
        </div>` : ''}
      `;
    }

    render() {
      const active = document.activeElement;
      let restore = null;
      if (active && this.root.contains(active) && active.dataset && active.dataset.field) {
        restore = { field: active.dataset.field, start: active.selectionStart, end: active.selectionEnd };
      }
      this.root.innerHTML = this.template();
      if (restore) {
        const el = this.root.querySelector(`[data-field="${restore.field}"]`);
        if (el) {
          el.focus();
          if (typeof restore.start === 'number' && el.setSelectionRange) {
            try { el.setSelectionRange(restore.start, restore.end); } catch (e) {}
          }
        }
      }
    }

    onClick(e) {
      const t = e.target.closest('[data-action]');
      if (!t) return;
      const action = t.dataset.action;
      if (action === 'open-envelope') {
        if (this._d && this._d.moved) return;
        const item = this.data[+t.dataset.idx];
        this.setState({ open: item, focused: false });
      } else if (action === 'close-sheet') {
        this.setState({ open: null });
      } else if (action === 'clear-query') {
        this.setState({ query: '', focused: false });
      } else if (action === 'recenter') {
        this.setState({ panX: 0, panY: 0, zoom: 1 });
      } else if (action === 'goto-result') {
        const d = this.data[+t.dataset.idx];
        this.setState({ panX: -(d.x - 800), panY: -(d.y - 800), focused: false, open: null });
        clearTimeout(this._ot);
        this._ot = setTimeout(() => this.setState({ open: d }), 520);
      }
    }

    onInput(e) {
      if (e.target.dataset.action === 'query-input') {
        this.setState({ query: e.target.value });
      }
    }

    onDown(e) {
      if (e.target.closest && e.target.closest('[data-nopan]')) {
        if (e.target.dataset.actionFocus === 'focus-query') this.setState({ focused: true });
        return;
      }
      if (this.state.focused) this.setState({ focused: false });
      this._ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (this._ptrs.size === 2) {
        const p = [...this._ptrs.values()];
        this._pinch = { d: Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y), z: this.state.zoom };
        this._d = null;
      } else {
        this._d = { sx: e.clientX, sy: e.clientY, px: this.state.panX, py: this.state.panY, on: true, moved: false };
      }
    }

    onMove(e) {
      if (this._ptrs.has(e.pointerId)) this._ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (this._pinch && this._ptrs.size >= 2) {
        const p = [...this._ptrs.values()];
        const dd = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
        this.state.zoom = Math.max(0.5, Math.min(2.5, +(this._pinch.z * dd / this._pinch.d).toFixed(3)));
        this.updateTransform();
        return;
      }
      const d = this._d;
      if (!d || !d.on) return;
      const dx = e.clientX - d.sx, dy = e.clientY - d.sy;
      if (Math.abs(dx) + Math.abs(dy) > 6) d.moved = true;
      this.state.panX = d.px + dx;
      this.state.panY = d.py + dy;
      this.updateTransform();
    }

    onUp(e) {
      if (e && e.pointerId != null) this._ptrs.delete(e.pointerId);
      if (this._ptrs.size < 2) this._pinch = null;
      if (this._d) this._d.on = false;
    }

    onWheel(e) {
      this.state.zoom = Math.max(0.5, Math.min(2.5, +(this.state.zoom * (e.deltaY < 0 ? 1.08 : 0.93)).toFixed(3)));
      this.updateTransform();
    }
  }

  new Viewer(document.getElementById('app'));
})();
</script>
</body>
</html>
