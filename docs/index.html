<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>寄せ書き</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%}
  body{
    font-family:'Zen Maru Gothic',sans-serif;
    background:#e4e7ea;
    background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.2) 0px,rgba(255,255,255,.2) 42px,rgba(255,255,255,0) 42px,rgba(255,255,255,0) 84px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px 20px;box-sizing:border-box;gap:26px;
  }
  .pin{width:46px;height:46px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.9),rgba(255,255,255,0) 46%),#e23b2e;box-shadow:0 3px 5px rgba(0,0,0,.3)}
  h1{margin:0;font-size:26px;font-weight:900;color:#3a3d42;letter-spacing:.02em}
  p.sub{margin:0;font-size:14px;color:#7a7f86;text-align:center;line-height:1.7}
  .menu{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px;margin-top:6px}
  a.card{
    text-decoration:none;background:#fff;border-radius:18px;padding:18px 20px;
    box-shadow:0 3px 14px rgba(0,0,0,.12);display:flex;align-items:center;gap:16px;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  a.card:active{transform:scale(.98);box-shadow:0 2px 8px rgba(0,0,0,.14)}
  .emoji{font-size:26px;width:44px;height:44px;flex:none;display:flex;align-items:center;justify-content:center;background:#f4f6f8;border-radius:12px}
  .txt b{display:block;font-size:16px;color:#333;font-weight:800}
  .txt span{font-size:12.5px;color:#8a9099}
  .note{font-size:11.5px;color:#a4a9b0;text-align:center;max-width:340px;line-height:1.6;margin-top:4px}
</style>
</head>
<body>
  <div class="pin"></div>
  <h1>寄せ書き</h1>
  <p class="sub">みんなの封筒を、地図の上に。<br>ピンをタップしてメッセージを開こう。</p>
  <nav class="menu">
    <a class="card" href="viewer.html">
      <span class="emoji">🗺️</span>
      <span class="txt"><b>みんなの寄せ書きを見る</b><span>封筒をタップしてコメントと写真を閲覧</span></span>
    </a>
    <a class="card" href="contribute.html">
      <span class="emoji">✍️</span>
      <span class="txt"><b>メッセージを寄せる</b><span>地図にピンを置いて投稿する</span></span>
    </a>
    <a class="card" href="editor.html">
      <span class="emoji">🎛️</span>
      <span class="txt"><b>調整エディタ</b><span>封筒・ピン・配色を微調整（内部用）</span></span>
    </a>
  </nav>
  <p class="note">スマホ表示推奨。投稿はみんなに共有されます。投稿には招待リンクに含まれる「投稿キー」が必要です。</p>
</body>
</html>
