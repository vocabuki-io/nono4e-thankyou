<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>寄せ書き｜調整エディタ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@500;700;900&family=Kiwi+Maru:wght@400;500&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;height:100%;overscroll-behavior:none;background:#e4e7ea}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
input[type="range"]{-webkit-appearance:none;appearance:none;height:28px;background:transparent;width:100%;margin:0}
input[type="range"]::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:#d8dce2}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:1px solid #c4c9d0;box-shadow:0 1px 4px rgba(0,0,0,.28);margin-top:-10px}
input[type="color"]{border:1px solid #d0d4da;padding:0;width:40px;height:30px;border-radius:8px;background:#fff}
input[type="color"]::-webkit-color-swatch-wrapper{padding:2px}
input[type="color"]::-webkit-color-swatch{border:none;border-radius:5px}
@keyframes sheetin{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes toastin{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
#app{position:fixed;inset:0;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
</style>
</head>
<body>
<div id="app"></div>
<script src="config.js"></script>
<script src="store.js"></script>
<script>
(function () {
  const KEY = 'yosegaki-editor-v1';
  const IMGKEY = 'yosegaki-center-img-v1';
  const FONTS = {
    zen: "'Zen Maru Gothic', sans-serif",
    mplus: "'M PLUS Rounded 1c', sans-serif",
    kiwi: "'Kiwi Maru', serif",
    noto: "'Noto Sans JP', sans-serif"
  };
  const NAMES = ['ゆうた','さくら','けんじ','あおい','ミホ','たかし','リサ','ショウ','なな','ヒロ','まい','ダイキ','えみ','こうた','ゆき','ジュン','ほのか','タクミ','めぐみ','そら','カナ','しんじ','りお','マサ','ちひろ','トモ','はるか','ケイ','あゆみ','レン','みつき','ゴロー','ノゾミ','いつき','サヤ','てつや','モモ','かずき','ユイ','おさむ'];
  const COMMENTS = [
    'ご卒業おめでとうございます！一緒に過ごした時間は宝物です。新しい場所でも、らしさ全開で頑張ってください。また集まりましょうね！',
    'お疲れさまでした！いつも笑顔で助けてくれてありがとう。これからの新しい挑戦、心から応援しています。体にだけは気をつけて！',
    'おめでとう！初めて会った日のことを今でも覚えています。あなたのおかげで毎日が楽しかったです。ずっと友達でいてください。',
    '本当にありがとうございました。困ったときいつも一番に声をかけてくれたこと、忘れません。またご飯行きましょう！'
  ];

  function rng(seed) {
    let t = seed >>> 0;
    return () => {
      t += 0x6D2B79F5;
      let r = Math.imul(t ^ (t >>> 15), 1 | t);
      r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
      return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
    };
  }

  function styleStr(obj) {
    return Object.keys(obj).map(k => {
      const prop = k.replace(/[A-Z]/g, m => '-' + m.toLowerCase());
      return `${prop}:${obj[k]}`;
    }).join(';');
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  const DEFAULT_SETTINGS = {
    envW: 110, envRatio: 0.72, envRadius: 3, envColor: '#f2dd8e', flapColor: '#e3c463',
    shadow: 0.18, tilt: 4, nameSize: 12, nameColor: '#6b5c26',
    pinSize: 18, pinColor: '#e23b2e', pinOffset: -8,
    bgPattern: 'stripe', bgColor: '#e4e7ea', patDensity: 0.05,
    font: 'zen', centerSize: 210,
    count: 14, zoom: 1, seed: 7
  };

  class Editor {
    constructor(root) {
      this.root = root;
      this.state = {
        tab: 'env', panel: true, open: null, panX: 0, panY: 0, toast: '',
        centerImg: null,
        settings: { ...DEFAULT_SETTINGS }
      };
      this._ptrs = new Map();
      this._pinch = null;
      this._d = null;
      this._envelopes = [];

      try {
        const s = JSON.parse(localStorage.getItem(KEY));
        if (s) this.state.settings = { ...this.state.settings, ...s };
        const img = localStorage.getItem(IMGKEY);
        if (img) this.state.centerImg = img;
      } catch (e) {}

      root.addEventListener('pointerdown', e => this.onDown(e));
      root.addEventListener('pointermove', e => this.onMove(e));
      root.addEventListener('pointerup', e => this.onUp(e));
      root.addEventListener('pointerleave', e => this.onUp(e));
      root.addEventListener('wheel', e => this.onWheel(e), { passive: true });
      root.addEventListener('click', e => this.onClick(e));
      root.addEventListener('input', e => this.onInput(e));

      this.render();
    }

    setState(patch) { Object.assign(this.state, patch); this.render(); }

    saveSet(patch) {
      Object.assign(this.state.settings, patch);
      try { localStorage.setItem(KEY, JSON.stringify(this.state.settings)); } catch (e) {}
      this.render();
    }

    canvasTransform() {
      const s = this.state;
      return `translate(calc(-50% + ${s.panX}px), calc(-50% + ${s.panY}px)) scale(${s.settings.zoom})`;
    }

    updateTransform() {
      const canvas = this.root.querySelector('#canvas');
      if (canvas) canvas.style.transform = this.canvasTransform();
    }

    pickCenterImage() {
      const inp = document.createElement('input');
      inp.type = 'file';
      inp.accept = 'image/*';
      inp.style.display = 'none';
      document.body.appendChild(inp);
      inp.onchange = () => {
        const file = inp.files && inp.files[0];
        document.body.removeChild(inp);
        if (!file) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          const max = 900;
          const sc = Math.min(1, max / Math.max(img.width, img.height));
          const c = document.createElement('canvas');
          c.width = Math.round(img.width * sc);
          c.height = Math.round(img.height * sc);
          c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
          const data = c.toDataURL('image/jpeg', 0.85);
          URL.revokeObjectURL(url);
          this.setState({ centerImg: data });
          try { localStorage.setItem(IMGKEY, data); } catch (err) {
            this.flashToast('画像が大きすぎて保存できません（表示のみ）');
          }
        };
        img.src = url;
      };
      inp.click();
    }

    flashToast(msg) {
      this.state.toast = msg;
      this.render();
      clearTimeout(this._tt);
      this._tt = setTimeout(() => this.setState({ toast: '' }), 1800);
    }

    // 現在の見た目設定を Worker の公開設定に反映する（viewer/contribute へ即時反映）
    async publish() {
      if (this._publishing) return;
      const A = Yosegaki.admin;
      if (!A.getApi()) {
        const api = prompt('Worker の URL を入力してください（例: https://yosegaki.xxx.workers.dev）');
        if (!api || !api.trim()) return;
        A.setApi(api.trim());
      }
      if (!A.hasKey()) {
        const k = prompt('管理者キーを入力してください');
        if (!k || !k.trim()) return;
        A.setKey(k.trim());
      }
      const S = this.state.settings;
      const theme = {
        envW: S.envW, envRatio: S.envRatio, envRadius: S.envRadius,
        envColor: S.envColor, flapColor: S.flapColor,
        shadow: S.shadow, tilt: S.tilt, nameSize: S.nameSize, nameColor: S.nameColor,
        pinSize: S.pinSize, pinColor: S.pinColor, pinOffset: S.pinOffset,
        bgPattern: S.bgPattern, bgColor: S.bgColor, patDensity: S.patDensity,
        font: S.font, centerSize: S.centerSize
      };
      this._publishing = true;
      this.flashToast('保存中…');
      try {
        if (this.state.centerImg) await A.uploadAsset('center', this.state.centerImg);
        else await A.deleteAsset('center');
        await A.putConfig(theme);
        this.flashToast('公開デザインを保存しました');
      } catch (e) {
        if (e && e.status === 401) A.setKey('');
        this.flashToast((e && e.message) || '保存に失敗しました');
      } finally {
        this._publishing = false;
      }
    }

    copyJson() {
      const json = JSON.stringify(this.state.settings, null, 2);
      const done = () => this.flashToast('設定をコピーしました');
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(json).then(done).catch(() => this.fallbackCopy(json, done));
      } else {
        this.fallbackCopy(json, done);
      }
    }

    fallbackCopy(text, done) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
      done();
    }

    buildEnvelopes() {
      const S = this.state.settings;
      const rnd = rng(S.seed);
      const envH = S.envW * S.envRatio;
      const C = 800, minR = S.centerSize / 2 + S.envW * 0.72 + 26, maxR = 640;
      const envelopes = [];
      for (let i = 0; i < S.count; i++) {
        const a = rnd() * Math.PI * 2;
        const r = minR + Math.pow(rnd(), 0.72) * Math.max(40, maxR - minR);
        const x = Math.min(1450, Math.max(150, C + Math.cos(a) * r * 1.12));
        const y = Math.min(1430, Math.max(170, C + Math.sin(a) * r * 0.95));
        const deg = (rnd() * 2 - 1) * S.tilt;
        const name = NAMES[i % NAMES.length];
        envelopes.push({
          name, comment: COMMENTS[i % COMMENTS.length],
          wrapStyle: {
            position: 'absolute', left: x + 'px', top: y + 'px',
            width: S.envW + 'px', height: envH + 'px',
            transform: `translate(-50%,-50%) rotate(${deg}deg)`,
            zIndex: i + 1, cursor: 'pointer'
          },
          bodyStyle: {
            position: 'absolute', inset: 0, background: S.envColor,
            borderRadius: S.envRadius + 'px', overflow: 'hidden',
            boxShadow: `0 2px 8px rgba(0,0,0,${S.shadow})`
          },
          flapStyle: {
            position: 'absolute', top: 0, left: 0, right: 0, height: '46%',
            background: S.flapColor, clipPath: 'polygon(0 0, 100% 0, 50% 100%)'
          },
          nameStyle: {
            position: 'absolute', bottom: '7%', left: 0, right: 0,
            textAlign: 'center', fontSize: S.nameSize + 'px',
            fontWeight: 700, color: S.nameColor, whiteSpace: 'nowrap', overflow: 'hidden'
          },
          pinStyle: {
            position: 'absolute', top: S.pinOffset + 'px', left: '50%',
            transform: 'translateX(-50%)',
            width: S.pinSize + 'px', height: S.pinSize + 'px', borderRadius: '50%',
            background: `radial-gradient(circle at 35% 30%, rgba(255,255,255,.9), rgba(255,255,255,0) 46%), ${S.pinColor}`,
            boxShadow: '0 2px 3px rgba(0,0,0,.35)'
          }
        });
      }
      return envelopes;
    }

    pill(active) {
      return {
        border: 'none', borderRadius: '999px', padding: '8px 14px',
        fontSize: '12.5px', fontWeight: 700, whiteSpace: 'nowrap', fontFamily: 'inherit',
        background: active ? '#3b4652' : '#eef0f3', color: active ? '#fff' : '#555b63'
      };
    }

    controlsForTab(tab) {
      const S = this.state.settings;
      const sl = (key, label, min, max, step) => ({ type: 'slider', key, label, min, max, step, value: S[key], disp: step < 1 ? (+S[key]).toFixed(2) : String(S[key]) });
      const col = (key, label) => ({ type: 'color', key, label, value: S[key] });
      const btns = (key, label, opts) => ({ type: 'buttons', key, label, options: opts });
      const byTab = {
        env: [
          sl('envW', '封筒の幅', 70, 170, 2),
          sl('envRatio', '縦横比', 0.55, 0.95, 0.01),
          sl('envRadius', '角丸', 0, 14, 1),
          col('envColor', '本体色'),
          col('flapColor', 'フラップ色'),
          sl('shadow', '影の濃さ', 0, 0.5, 0.02),
          sl('tilt', '傾きばらつき（度）', 0, 12, 1),
          sl('nameSize', '名前の文字サイズ', 9, 18, 1),
          col('nameColor', '名前の色')
        ],
        pin: [
          sl('pinSize', 'ピンの大きさ', 10, 30, 1),
          col('pinColor', 'ピンの色'),
          sl('pinOffset', '縦位置オフセット', -20, 10, 1)
        ],
        bg: [
          btns('bgPattern', 'パターン', [
            { label: 'プレーン', value: 'plain' },
            { label: 'ストライプ', value: 'stripe' },
            { label: 'ドット', value: 'dot' }
          ]),
          col('bgColor', 'ベース色'),
          sl('patDensity', 'パターン濃度', 0, 0.2, 0.005)
        ],
        type: [
          btns('font', 'フォント', [
            { label: 'Zen丸ゴシック', value: 'zen' },
            { label: 'M+ Rounded', value: 'mplus' },
            { label: 'Kiwi丸', value: 'kiwi' },
            { label: 'Noto Sans', value: 'noto' }
          ])
        ],
        layout: [
          sl('count', '封筒の数', 4, 40, 1),
          sl('centerSize', '中心地のサイズ', 120, 360, 10),
          sl('zoom', 'ズーム', 0.5, 1.8, 0.05),
          { type: 'action', label: '配置をシャッフル', action: 'shuffle' },
          { type: 'action', label: '公開デザインとして保存', action: 'publish' },
          { type: 'action', label: '設定JSONをコピー', action: 'copy-json' }
        ]
      };
      return byTab[tab] || [];
    }

    controlHtml(c) {
      if (c.type === 'slider') {
        return `
          <div style="display:flex;flex-direction:column;gap:4px">
            <div style="display:flex;justify-content:space-between;align-items:baseline">
              <span style="font-size:13px;font-weight:700;color:#4a4f56">${esc(c.label)}</span>
              <span style="font-size:12px;color:#8a909a;font-variant-numeric:tabular-nums">${esc(c.disp)}</span>
            </div>
            <input type="range" min="${c.min}" max="${c.max}" step="${c.step}" value="${c.value}" data-action="slider" data-key="${c.key}">
          </div>`;
      }
      if (c.type === 'color') {
        return `
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:13px;font-weight:700;color:#4a4f56">${esc(c.label)}</span>
            <input type="color" value="${c.value}" data-action="color" data-key="${c.key}">
          </div>`;
      }
      if (c.type === 'buttons') {
        const S = this.state.settings;
        return `
          <div style="display:flex;flex-direction:column;gap:4px">
            <span style="font-size:13px;font-weight:700;color:#4a4f56">${esc(c.label)}</span>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              ${c.options.map(o => `<button data-action="pick" data-key="${c.key}" data-value="${o.value}" style="${styleStr(this.pill(S[c.key] === o.value))}">${esc(o.label)}</button>`).join('')}
            </div>
          </div>`;
      }
      if (c.type === 'action') {
        return `<button data-action="${c.action}" style="border:1px solid #c9ced5;background:#fff;border-radius:10px;padding:11px;font-size:13px;font-weight:700;color:#3b6ea5;font-family:inherit">${esc(c.label)}</button>`;
      }
      return '';
    }

    template() {
      const st = this.state;
      const S = st.settings;

      const a = S.patDensity;
      let bgImage = 'linear-gradient(rgba(255,255,255,.35), rgba(0,0,0,.03))';
      let bgSize = 'auto';
      if (S.bgPattern === 'stripe') {
        bgImage = `repeating-linear-gradient(90deg, rgba(255,255,255,${a * 4}) 0px, rgba(255,255,255,${a * 4}) 42px, rgba(255,255,255,0) 42px, rgba(255,255,255,0) 84px), linear-gradient(rgba(255,255,255,.3), rgba(0,0,0,.03))`;
      } else if (S.bgPattern === 'dot') {
        bgImage = `radial-gradient(rgba(0,0,0,${a * 3}) 1.5px, transparent 1.6px)`;
        bgSize = '26px 26px';
      }

      const canvasStyle = {
        position: 'absolute', left: '50%', top: '50%',
        width: '1600px', height: '1600px',
        transform: this.canvasTransform(),
        backgroundColor: S.bgColor,
        backgroundImage: bgImage,
        backgroundSize: bgSize
      };
      const centerStyle = {
        position: 'absolute', left: '800px', top: '800px',
        width: S.centerSize + 'px', height: S.centerSize + 'px',
        transform: 'translate(-50%,-50%)',
        background: st.centerImg ? `center / contain no-repeat url(${st.centerImg}), #fff` : 'rgba(255,255,255,.55)',
        border: st.centerImg ? '4px solid #fff' : '2px dashed rgba(0,0,0,.25)',
        borderRadius: '14px',
        boxShadow: st.centerImg ? '0 3px 14px rgba(0,0,0,.22)' : 'none',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: '12px', color: '#555', cursor: 'pointer'
      };

      this._envelopes = this.buildEnvelopes();

      const tabs = [
        { id: 'env', label: '封筒' }, { id: 'pin', label: 'ピン' },
        { id: 'bg', label: '背景' }, { id: 'type', label: '文字' },
        { id: 'layout', label: '配置' }
      ];
      const controls = this.controlsForTab(st.tab);

      return `
        <div style="position:fixed;inset:0;overflow:hidden;background:${S.bgColor};font-family:${FONTS[S.font]};touch-action:none;user-select:none;-webkit-user-select:none">
          <div id="canvas" style="${styleStr(canvasStyle)}">
            <div style="${styleStr(centerStyle)}" data-action="center-click">
              ${!st.centerImg ? `<div style="font-weight:700;opacity:.55;text-align:center;line-height:1.5;font-size:14px">中心地デザイン<br>タップで画像を追加</div>` : ''}
              ${st.centerImg ? `<button data-action="center-clear" data-nopan="1" style="position:absolute;top:-12px;right:-12px;width:30px;height:30px;border-radius:50%;border:none;background:rgba(40,44,50,.85);color:#fff;font-size:13px;box-shadow:0 2px 6px rgba(0,0,0,.3)">✕</button>` : ''}
            </div>
            ${this._envelopes.map((env, i) => `
              <div style="${styleStr(env.wrapStyle)}" data-action="open-envelope" data-idx="${i}">
                <div style="${styleStr(env.bodyStyle)}">
                  <div style="${styleStr(env.flapStyle)}"></div>
                  <div style="${styleStr(env.nameStyle)}">${esc(env.name)}</div>
                </div>
                <div style="${styleStr(env.pinStyle)}"></div>
              </div>`).join('')}
          </div>

          <div style="position:absolute;top:calc(env(safe-area-inset-top) + 10px);left:12px;z-index:10;background:rgba(255,255,255,.92);border-radius:999px;padding:8px 14px;font-size:12px;font-weight:700;color:#444;box-shadow:0 2px 8px rgba(0,0,0,.15)">寄せ書き｜調整エディタ</div>

          <button data-nopan="1" data-action="recenter" style="position:absolute;top:calc(env(safe-area-inset-top) + 6px);right:12px;z-index:10;width:42px;height:42px;border-radius:50%;border:none;background:rgba(255,255,255,.95);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:19px;color:#3b6ea5;display:flex;align-items:center;justify-content:center">◎</button>

          ${st.panel ? `
          <div data-nopan="1" style="position:absolute;left:0;right:0;bottom:0;z-index:20;background:rgba(255,255,255,.97);border-radius:18px 18px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);padding:6px 0 calc(env(safe-area-inset-bottom) + 8px);touch-action:pan-y">
            <div data-action="toggle-panel" style="padding:4px 0 8px;display:flex;justify-content:center;cursor:pointer">
              <div style="width:44px;height:5px;border-radius:3px;background:#d3d7dd"></div>
            </div>
            <div style="display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto">
              ${tabs.map(t => `<button data-action="tab" data-tab="${t.id}" style="${styleStr(this.pill(t.id === st.tab))}">${esc(t.label)}</button>`).join('')}
            </div>
            <div style="max-height:32dvh;overflow-y:auto;padding:4px 18px 6px;display:flex;flex-direction:column;gap:15px;touch-action:pan-y">
              ${controls.map(c => this.controlHtml(c)).join('')}
            </div>
          </div>` : `
          <button data-nopan="1" data-action="toggle-panel" style="position:absolute;right:12px;bottom:calc(env(safe-area-inset-bottom) + 14px);z-index:20;border:none;background:#3b6ea5;color:#fff;border-radius:999px;padding:13px 18px;font-size:13px;font-weight:700;box-shadow:0 3px 12px rgba(0,0,0,.25);font-family:inherit">調整パネル</button>`}

          ${st.open ? `
          <div data-nopan="1" style="position:absolute;left:0;right:0;bottom:0;z-index:30;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -6px 30px rgba(0,0,0,.25);padding:10px 20px calc(env(safe-area-inset-bottom) + 22px);animation:sheetin .22s ease-out">
            <div style="display:flex;justify-content:center;padding:2px 0 10px">
              <div style="width:44px;height:5px;border-radius:3px;background:#e0e3e8"></div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
              <div style="font-size:18px;font-weight:800;color:#333">${esc(st.open.name)} さんより</div>
              <button data-action="close-sheet" style="width:34px;height:34px;border-radius:50%;border:none;background:#eef0f3;font-size:15px;color:#666">✕</button>
            </div>
            <div style="width:100%;height:150px;border-radius:12px;background:#e9ecef;display:flex;align-items:center;justify-content:center;color:#9aa1ab;font-size:13px;font-weight:700;margin-bottom:12px">写真（プレースホルダ）</div>
            <div style="font-size:15px;line-height:1.8;color:#3d4148">${esc(st.open.comment)}</div>
          </div>` : ''}

          ${st.toast ? `<div style="position:absolute;left:50%;bottom:45dvh;transform:translateX(-50%);z-index:40;background:rgba(40,44,50,.92);color:#fff;font-size:13px;font-weight:700;border-radius:999px;padding:10px 18px;animation:toastin .2s ease-out">${esc(st.toast)}</div>` : ''}
        </div>
      `;
    }

    render() {
      this.root.innerHTML = this.template();
    }

    onClick(e) {
      const t = e.target.closest('[data-action]');
      if (!t) return;
      const action = t.dataset.action;
      if (action === 'open-envelope') {
        if (this._d && this._d.moved) return;
        this.setState({ open: this._envelopes[+t.dataset.idx] });
      } else if (action === 'close-sheet') {
        this.setState({ open: null });
      } else if (action === 'recenter') {
        this.state.panX = 0; this.state.panY = 0;
        this.saveSet({ zoom: 1 });
      } else if (action === 'toggle-panel') {
        this.setState({ panel: !this.state.panel });
      } else if (action === 'tab') {
        this.setState({ tab: t.dataset.tab });
      } else if (action === 'pick') {
        this.saveSet({ [t.dataset.key]: t.dataset.value });
      } else if (action === 'shuffle') {
        this.saveSet({ seed: (Math.random() * 1e6) | 0 });
      } else if (action === 'publish') {
        this.publish();
      } else if (action === 'copy-json') {
        this.copyJson();
      } else if (action === 'center-clear') {
        this.setState({ centerImg: null });
        try { localStorage.removeItem(IMGKEY); } catch (err) {}
      } else if (action === 'center-click') {
        if (this._d && this._d.moved) return;
        this.pickCenterImage();
      }
    }

    onInput(e) {
      if (e.target.dataset.action === 'slider') {
        this.saveSet({ [e.target.dataset.key]: parseFloat(e.target.value) });
      } else if (e.target.dataset.action === 'color') {
        this.saveSet({ [e.target.dataset.key]: e.target.value });
      }
    }

    onDown(e) {
      if (e.target.closest && e.target.closest('[data-nopan]')) return;
      this._ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (this._ptrs.size === 2) {
        const p = [...this._ptrs.values()];
        this._pinch = { d: Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y), z: this.state.settings.zoom };
        this._d = null;
      } else {
        this._d = { sx: e.clientX, sy: e.clientY, px: this.state.panX, py: this.state.panY, on: true, moved: false };
      }
    }

    onMove(e) {
      if (this._ptrs.has(e.pointerId)) this._ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (this._pinch && this._ptrs.size >= 2) {
        const p = [...this._ptrs.values()];
        const dd = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
        this.state.settings.zoom = Math.max(0.5, Math.min(1.8, +(this._pinch.z * dd / this._pinch.d).toFixed(3)));
        this.updateTransform();
        return;
      }
      const d = this._d;
      if (!d || !d.on) return;
      const dx = e.clientX - d.sx, dy = e.clientY - d.sy;
      if (Math.abs(dx) + Math.abs(dy) > 6) d.moved = true;
      this.state.panX = d.px + dx;
      this.state.panY = d.py + dy;
      this.updateTransform();
    }

    onUp(e) {
      if (e && e.pointerId != null) this._ptrs.delete(e.pointerId);
      if (this._ptrs.size < 2) {
        if (this._pinch) {
          try { localStorage.setItem(KEY, JSON.stringify(this.state.settings)); } catch (err) {}
        }
        this._pinch = null;
      }
      if (this._d) this._d.on = false;
    }

    onWheel(e) {
      this.state.settings.zoom = Math.max(0.5, Math.min(1.8, +(this.state.settings.zoom * (e.deltaY < 0 ? 1.08 : 0.93)).toFixed(3)));
      this.updateTransform();
      clearTimeout(this._wt);
      this._wt = setTimeout(() => {
        try { localStorage.setItem(KEY, JSON.stringify(this.state.settings)); } catch (err) {}
      }, 300);
    }
  }

  new Editor(document.getElementById('app'));
})();
</script>
</body>
</html>
